# Momo Candie NFT — Deployment Pipeline
#
# Each phase is a separate job with a required manual-approval environment
# gate before execution.  Phases run in sequence; a failure at any step
# halts the pipeline.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DEPLOYER_PRIVATE_KEY   — deployer EOA private key (0x...)
#   RPC_URL_MAINNET        — Ethereum mainnet RPC (Alchemy / Infura)
#   RPC_URL_SEPOLIA        — Sepolia testnet RPC
#   ETHERSCAN_API_KEY      — for source verification
#   UNREVEALED_URI         — ipfs://Qm.../unrevealed.json
#   BASE_URI               — ipfs://QmFolder/ (set before reveal job)
#   RESERVE_RECIPIENT      — treasury / Gnosis Safe address
#   DAO_ADDRESS            — final DAO multisig address
#
# Required GitHub Environments (Settings → Environments):
#   deploy-mainnet    — add required reviewers (e.g. 2 core team members)
#   verify            — can auto-approve or require 1 reviewer
#   presale           — required reviewers
#   public-mint       — required reviewers
#   reserve-mint      — required reviewers
#   reveal            — required reviewers (high stakes — triggers reveal)
#   dao-handoff       — required reviewers + CODEOWNERS sign-off

name: NFT Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'sepolia'
        type: choice
        options: [sepolia, mainnet]
      start_phase:
        description: 'Start from phase (useful for resuming)'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, verify, presale, public, reserve, reveal, handoff]

env:
  NETWORK: ${{ github.event.inputs.network }}

# ── Phase 1: Deploy ──────────────────────────────────────────────
jobs:
  deploy:
    name: "1 · Deploy Contract"
    runs-on: ubuntu-latest
    environment: deploy-mainnet
    if: ${{ github.event.inputs.start_phase == 'deploy' }}
    outputs:
      contract_address: ${{ steps.deploy.outputs.contract_address }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        working-directory: contracts
        run: npm ci

      - name: Deploy
        id: deploy
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          UNREVEALED_URI:       ${{ secrets.UNREVEALED_URI }}
        run: |
          output=$(npx hardhat run scripts/deploy.js --network $NETWORK 2>&1)
          echo "$output"
          address=$(echo "$output" | grep "Contract deployed:" | awk '{print $NF}')
          echo "contract_address=$address" >> $GITHUB_OUTPUT

      - name: Save deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ env.NETWORK }}
          path: contracts/.deployment.json
          retention-days: 90

  # ── Phase 2: Verify ────────────────────────────────────────────
  verify:
    name: "2 · Verify on Etherscan"
    runs-on: ubuntu-latest
    environment: verify
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-${{ env.NETWORK }}
          path: contracts/

      - name: Install
        working-directory: contracts
        run: npm ci

      - name: Verify
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          ETHERSCAN_API_KEY:    ${{ secrets.ETHERSCAN_API_KEY }}
          UNREVEALED_URI:       ${{ secrets.UNREVEALED_URI }}
          CONTRACT_ADDRESS:     ${{ needs.deploy.outputs.contract_address }}
        run: npx hardhat run scripts/verify.js --network $NETWORK

  # ── Phase 3: Presale ───────────────────────────────────────────
  presale:
    name: "3 · Open Presale"
    runs-on: ubuntu-latest
    environment: presale
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: contracts
        run: npm ci

      - name: Generate Merkle tree & open presale
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          CONTRACT_ADDRESS:     ${{ needs.deploy.outputs.contract_address }}
          ALLOWLIST_PATH:       ./allowlist.json
        run: |
          # allowlist.json must be committed to the repo (addresses only, no PII)
          npx hardhat run scripts/set-presale.js --network $NETWORK

      - name: Upload Merkle tree
        uses: actions/upload-artifact@v4
        with:
          name: merkle-tree
          path: contracts/merkle-tree.json
          retention-days: 365

  # ── Phase 4: Public Mint ───────────────────────────────────────
  public-mint:
    name: "4 · Open Public Mint"
    runs-on: ubuntu-latest
    environment: public-mint
    needs: [deploy, presale]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: contracts
        run: npm ci
      - name: Open public mint
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          CONTRACT_ADDRESS:     ${{ needs.deploy.outputs.contract_address }}
        run: npx hardhat run scripts/set-public.js --network $NETWORK

  # ── Phase 5: Reserve Mint ──────────────────────────────────────
  reserve-mint:
    name: "5 · Reserve Mint"
    runs-on: ubuntu-latest
    environment: reserve-mint
    needs: [deploy, public-mint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: contracts
        run: npm ci
      - name: Reserve mint + close sale
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          CONTRACT_ADDRESS:     ${{ needs.deploy.outputs.contract_address }}
          RESERVE_RECIPIENT:    ${{ secrets.RESERVE_RECIPIENT }}
          RESERVE_QUANTITY:     '250'
        run: npx hardhat run scripts/reserve-mint.js --network $NETWORK

  # ── Phase 6: Reveal ────────────────────────────────────────────
  reveal:
    name: "6 · Reveal Collection"
    runs-on: ubuntu-latest
    environment: reveal
    needs: [deploy, reserve-mint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: contracts
        run: npm ci
      - name: Reveal
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          CONTRACT_ADDRESS:     ${{ needs.deploy.outputs.contract_address }}
          BASE_URI:             ${{ secrets.BASE_URI }}
        run: npx hardhat run scripts/reveal.js --network $NETWORK

  # ── Phase 7: DAO Handoff ───────────────────────────────────────
  dao-handoff:
    name: "7 · DAO Handoff"
    runs-on: ubuntu-latest
    environment: dao-handoff
    needs: [deploy, reveal]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: contracts
        run: npm ci
      - name: Transfer ownership to DAO
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL_MAINNET:      ${{ secrets.RPC_URL_MAINNET }}
          RPC_URL_SEPOLIA:      ${{ secrets.RPC_URL_SEPOLIA }}
          CONTRACT_ADDRESS:     ${{ needs.deploy.outputs.contract_address }}
          DAO_ADDRESS:          ${{ secrets.DAO_ADDRESS }}
          CONFIRM_HANDOFF:      'yes'
        run: npx hardhat run scripts/dao-handoff.js --network $NETWORK
